name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -i "https://yckijwhegogzuqargwvv.supabase.co/rest/v1/ping" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" 